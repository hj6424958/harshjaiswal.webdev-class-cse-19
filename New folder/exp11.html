<!DOCTYPE html>
<html>
<head>
    <title>Flipkart Clone</title>
    <link rel="stylesheet" href="exp11.css">
</head>
<body>

    <!-- Navbar -->
    <nav>
        <div class="logo">Flipkart</div>

        <input type="text" placeholder="Search for products">

        <button>Login</button>

        <ul>
            <li>Cart</li>
            <li>Become a Seller</li>
        </ul>
    </nav>

    <!-- Categories -->
    <div class="categories">
        <div class="category">Mobiles</div>
        <div class="category">Fashion</div>
        <div class="category">Electronics</div>
        <div class="category">Home</div>
        <div class="category">Appliances</div>
    </div>

    <!-- Banner -->
    <div class="banner">
        <h1>Big Billion Days Sale</h1>
        <p>Up to 80% OFF</p>
    </div>

    <!-- Products -->
    <h2 class="title">Best Deals</h2>

    <div class="products">

        <div class="card">
            <img src="https://encrypted-tbn1.gstatic.com/shopping?q=tbn:ANd9GcRw-rRqsDytWhTvNaWlod6gHcNpWHTJLR3UFc3fPSQRtY4qF7D_RuRhbzp_D9CjE4ll5KMJZs-P8eVAzUNkHSrXcp6OrKrcQ_kxC0JPN10ZGAnuYspHAI3OLA">
            <h3>iPhone 15</h3>
            <p>₹69,999</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="https://in.store.asus.com/media/catalog/product/x/1/x1605va_clr_slvr_bcklt_kbd_mso_rfrsh_nonfngrprnt_1__1.png?quality=80&bg-color=255,255,255&fit=bounds&height=&width=&canvas=:">
            <h3>Laptop</h3>
            <p>₹49,999</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="https://img.magnific.com/free-psd/stunning-mountain-landscape-displayed-modern-smart-tv_191095-80909.jpg?semt=ais_hybrid&w=740&q=80">
            <h3>Smart TV</h3>
            <p>₹29,999</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="https://encrypted-tbn0.gstatic.com/shopping?q=tbn:ANd9GcT4bEGVCgCVUXk8FpZ_WX1OnZuMAWwi8V5tW8LkP45fRXJ7J9sHbfY6ORe1YM3ZhMRdHS2Tvk0TrxAqBo770hvkGYvBDGxcuCfi2kmmGTXqnkAuztFoXlVzcy2a">
            <h3>Headphones</h3>
            <p>₹1,999</p>
            <button>Buy Now</button>
        </div>

    </div>

</body>
</html>
